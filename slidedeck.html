<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Markdown Slide Deck</title>
  <style>
    :root {
      --bg-a: #ffffff;
      --bg-b: #f2f5fa;
      --text: #1e2430;
      --muted: #4f5a6d;
      --accent: #1c7ed6;
      --accent-hover: #176ab5;
      --focus-ring: #0f62b2;
      --slide-font: "Avenir Next", "Segoe UI", "Helvetica Neue", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: var(--slide-font);
      background: radial-gradient(circle at top left, var(--bg-a) 0%, var(--bg-b) 100%);
      overflow: hidden;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .skip-link {
      position: fixed;
      top: 8px;
      left: 8px;
      z-index: 200;
      padding: 8px 10px;
      border-radius: 8px;
      background: #ffffff;
      color: #10375f;
      border: 2px solid #9fc3e8;
      transform: translateY(-160%);
      transition: transform 120ms ease;
      text-decoration: none;
      font-weight: 700;
    }

    .skip-link:focus-visible {
      transform: translateY(0);
      outline: 3px solid var(--focus-ring);
      outline-offset: 2px;
    }

    .app {
      height: 100vh;
      width: 100%;
      padding: clamp(20px, 4vw, 44px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .app-title {
      margin: 0 0 6px;
      font-size: clamp(1.4rem, 2.2vw, 2rem);
      line-height: 1.15;
      letter-spacing: -0.01em;
      color: #1b2638;
      font-weight: 800;
    }

    .app-footer {
      width: min(1280px, 100%);
      display: none;
      justify-content: center;
      padding: 10px 0 4px;
      font-size: 0.9rem;
      color: var(--muted);
    }

    .app.show-footer .app-footer {
      display: flex;
    }

    .repo-link {
      color: var(--accent);
      text-decoration: underline;
      text-underline-offset: 0.14em;
      font-weight: 600;
    }

    .repo-link:hover {
      color: var(--accent-hover);
    }

    .upload-cta {
      border: 0;
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      padding: 11px 18px;
      font-size: 0.95rem;
      font-weight: 700;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      box-shadow: 0 10px 20px rgba(28, 126, 214, 0.22);
      transition: background 140ms ease, transform 140ms ease;
    }

    .upload-cta:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
    }

    .upload-cta:focus-visible {
      outline: 3px solid var(--focus-ring);
      outline-offset: 2px;
    }

    .upload-cta svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    .slide {
      width: min(1280px, 100%);
      flex: 1;
      min-height: 0;
      overflow: auto;
      padding: 0;
      line-height: 1.5;
      font-size: clamp(1rem, 1.18vw, 1.4rem);
    }

    .slide-center {
      min-height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(10px, 2vw, 24px);
    }

    .slide.is-tall .slide-center {
      align-items: flex-start;
    }

    .slide-content {
      width: min(1100px, 100%);
      transform-origin: top center;
    }

    .train-map {
      --station-size: 22px;
      --station-center-y: 22px;
      width: min(1100px, 100%);
      height: 66px;
      display: none;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 12px 22px 8px;
    }

    .app.train-visible .train-map {
      display: flex;
    }

    .train-track {
      position: absolute;
      left: 24px;
      right: 24px;
      height: 4px;
      background: #d3dbe8;
      border-radius: 999px;
      top: var(--station-center-y);
      transform: translateY(-50%);
    }

    .train-progress {
      position: absolute;
      left: 24px;
      height: 4px;
      background: #6eaee8;
      border-radius: 999px;
      top: var(--station-center-y);
      transform: translateY(-50%);
      pointer-events: none;
      z-index: 0;
    }

    .station-list {
      position: absolute;
      left: 24px;
      right: 24px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      top: calc(var(--station-center-y) - (var(--station-size) / 2));
      z-index: 1;
    }

    .station-step {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 7px;
      min-width: 18px;
    }

    .station {
      width: var(--station-size);
      height: var(--station-size);
      border-radius: 999px;
      border: 2px solid #c0cbdd;
      background: #fff;
      cursor: pointer;
      position: relative;
      transition: transform 120ms ease, border-color 120ms ease, background 120ms ease, box-shadow 120ms ease;
    }

    .station:focus-visible {
      outline: 3px solid var(--focus-ring);
      outline-offset: 2px;
    }

    .station::after {
      content: "";
      position: absolute;
      width: 4px;
      height: 4px;
      border-radius: 999px;
      background: #b9c6da;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .station:hover {
      transform: translateY(-1px);
      border-color: #8ea3c0;
    }

    .station.past {
      border-color: #6eaee8;
      background: #e6f2ff;
    }

    .station.past::after {
      background: #6eaee8;
    }

    .station.active {
      border-color: var(--accent);
      background: var(--accent);
      box-shadow: 0 0 0 4px rgba(28, 126, 214, 0.17);
      transform: translateY(-1px);
    }

    .station.active::after {
      background: #ffffff;
    }

    .station-num {
      font-size: 10px;
      line-height: 1;
      color: #667287;
      font-weight: 600;
      user-select: none;
    }

    .station-duration {
      font-size: 9px;
      line-height: 1;
      color: #8595ac;
      font-weight: 500;
      user-select: none;
    }

    .train-map.has-durations {
      height: 82px;
    }

    .duration-bar {
      width: min(1100px, 100%);
      padding: 4px 24px 8px;
    }

    .slide-duration-bar-track {
      position: absolute;
      bottom: 4px;
      left: 24px;
      right: 24px;
      height: 4px;
      background: rgba(110, 174, 232, 0.2);
      border-radius: 999px;
      overflow: hidden;
    }

    #durationBar .slide-duration-bar-track {
      flex: 1;
      position: static;
      bottom: auto;
      left: auto;
      right: auto;
      height: 6px;
    }

    .duration-bar-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .duration-bar-label {
      font-size: 0.68rem;
      font-weight: 600;
      color: #8595ac;
      width: 28px;
      text-align: right;
      flex-shrink: 0;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .slide-duration-bar-fill {
      height: 100%;
      width: 0%;
      background: var(--accent);
      border-radius: 999px;
      animation-name: slide-duration-fill;
      animation-timing-function: linear;
      animation-fill-mode: forwards;
    }

    @keyframes slide-duration-fill {
      from { width: 0% }
      to   { width: 100% }
    }

    .map-toggle {
      position: fixed;
      right: 16px;
      bottom: 14px;
      border: 0;
      border-radius: 999px;
      background: #ffffff;
      color: #2e3c54;
      width: 44px;
      height: 44px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(21, 34, 54, 0.14);
      transition: transform 120ms ease, box-shadow 120ms ease;
    }

    .map-toggle .material-symbols-outlined {
      font-size: 24px;
      line-height: 1;
    }

    .duration-bar-toggle {
      position: fixed;
      right: 68px;
      bottom: 14px;
      border: 0;
      border-radius: 999px;
      background: #ffffff;
      color: #2e3c54;
      width: 44px;
      height: 44px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(21, 34, 54, 0.14);
      transition: transform 120ms ease, box-shadow 120ms ease;
    }

    .duration-bar-toggle .material-symbols-outlined {
      font-size: 24px;
      line-height: 1;
    }

    .global-duration-bar-toggle {
      position: fixed;
      right: 120px;
      bottom: 14px;
      border: 0;
      border-radius: 999px;
      background: #ffffff;
      color: #2e3c54;
      width: 44px;
      height: 44px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(21, 34, 54, 0.14);
      transition: transform 120ms ease, box-shadow 120ms ease;
      z-index: 50;
    }

    .global-duration-bar-toggle .material-symbols-outlined {
      font-size: 24px;
      line-height: 1;
    }

    .map-toggle:hover:not(:disabled),
    .duration-bar-toggle:hover:not(:disabled),
    .global-duration-bar-toggle:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 10px 22px rgba(21, 34, 54, 0.18);
    }

    .map-toggle:disabled,
    .duration-bar-toggle:disabled,
    .global-duration-bar-toggle:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .map-toggle:focus-visible,
    .duration-bar-toggle:focus-visible,
    .global-duration-bar-toggle:focus-visible {
      outline: 3px solid var(--focus-ring);
      outline-offset: 2px;
    }

    .search-toggle {
      position: fixed;
      right: 16px;
      bottom: 66px;
      border: 0;
      border-radius: 999px;
      background: #ffffff;
      color: #2e3c54;
      width: 44px;
      height: 44px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(21, 34, 54, 0.14);
      transition: transform 120ms ease, box-shadow 120ms ease;
    }

    .search-toggle:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 22px rgba(21, 34, 54, 0.18);
    }

    .search-toggle:focus-visible {
      outline: 3px solid var(--focus-ring);
      outline-offset: 2px;
    }

    .search-toggle .material-symbols-outlined {
      font-size: 24px;
      line-height: 1;
    }

    .export-toggle {
      position: fixed;
      right: 16px;
      bottom: 274px;
      border: 0;
      border-radius: 999px;
      background: #ffffff;
      color: #2e3c54;
      width: 44px;
      height: 44px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(21, 34, 54, 0.14);
      transition: transform 120ms ease, box-shadow 120ms ease;
    }

    .export-toggle:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 22px rgba(21, 34, 54, 0.18);
    }

    .export-toggle:focus-visible {
      outline: 3px solid var(--focus-ring);
      outline-offset: 2px;
    }

    .export-toggle .material-symbols-outlined {
      font-size: 24px;
      line-height: 1;
    }

    .fullscreen-toggle {
      position: fixed;
      right: 16px;
      bottom: 222px;
      border: 0;
      border-radius: 999px;
      background: #ffffff;
      color: #2e3c54;
      width: 44px;
      height: 44px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(21, 34, 54, 0.14);
      transition: transform 120ms ease, box-shadow 120ms ease;
    }

    .fullscreen-toggle:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 22px rgba(21, 34, 54, 0.18);
    }

    .fullscreen-toggle:focus-visible {
      outline: 3px solid var(--focus-ring);
      outline-offset: 2px;
    }

    .fullscreen-toggle .material-symbols-outlined {
      font-size: 24px;
      line-height: 1;
    }

    .zoom-toggle {
      position: fixed;
      right: 16px;
      bottom: 170px;
      border: 0;
      border-radius: 999px;
      background: #ffffff;
      color: #2e3c54;
      width: 44px;
      height: 44px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(21, 34, 54, 0.14);
      transition: transform 120ms ease, box-shadow 120ms ease;
    }

    .zoom-toggle:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 22px rgba(21, 34, 54, 0.18);
    }

    .zoom-toggle:focus-visible {
      outline: 3px solid var(--focus-ring);
      outline-offset: 2px;
    }

    .zoom-toggle .material-symbols-outlined {
      font-size: 24px;
      line-height: 1;
    }

    .settings-toggle {
      position: fixed;
      right: 16px;
      bottom: 118px;
      border: 0;
      border-radius: 999px;
      background: #ffffff;
      color: #2e3c54;
      width: 44px;
      height: 44px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(21, 34, 54, 0.14);
      transition: transform 120ms ease, box-shadow 120ms ease;
    }

    .settings-toggle:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 22px rgba(21, 34, 54, 0.18);
    }

    .settings-toggle:focus-visible {
      outline: 3px solid var(--focus-ring);
      outline-offset: 2px;
    }

    .settings-toggle .material-symbols-outlined {
      font-size: 24px;
      line-height: 1;
    }

    /* ── Floating panels ── */
    .settings-panel,
    .zoom-panel {
      position: fixed;
      left: 0;
      top: 0;
      z-index: 56;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 4px;
      background: #ffffff;
      border: 1px solid #d5deeb;
      border-radius: 10px;
      padding: 8px;
      min-width: 230px;
      max-width: min(300px, calc(100vw - 24px));
      max-height: calc(100vh - 24px);
      overflow: auto;
      box-shadow: 0 14px 28px rgba(21, 34, 54, 0.2), 0 0 0 3px rgba(255, 255, 255, 0.95);
    }

    .settings-panel[hidden],
    .zoom-panel[hidden] {
      display: none;
    }

    .zoom-panel {
      min-width: 210px;
      padding: 10px;
      gap: 10px;
    }

    .zoom-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .zoom-value {
      font-size: 0.82rem;
      font-weight: 700;
      color: #23324a;
      min-width: 48px;
      text-align: right;
    }

    .zoom-actions {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .zoom-action {
      border: 1px solid #d5deeb;
      border-radius: 8px;
      padding: 8px 10px;
      background: #ffffff;
      color: #23324a;
      cursor: pointer;
      font-size: 0.88rem;
      font-weight: 700;
      font-family: var(--slide-font);
      transition: background 100ms ease, border-color 100ms ease, transform 100ms ease;
    }

    .zoom-action:hover:not(:disabled) {
      background: #f0f5fc;
      border-color: #bfd1ea;
      transform: translateY(-1px);
    }

    .zoom-action:focus-visible {
      outline: 3px solid var(--focus-ring);
      outline-offset: 1px;
    }

    .zoom-action:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .settings-swatches {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 4px;
      padding: 2px 2px 4px;
    }

    .settings-swatch {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: transform 100ms ease, border-color 100ms ease;
      padding: 0;
    }

    .settings-swatch:hover {
      transform: scale(1.12);
    }

    .settings-swatch[aria-pressed="true"] {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px #fff, 0 0 0 4px var(--accent);
    }

    .settings-swatch:focus-visible {
      outline: 3px solid var(--focus-ring);
      outline-offset: 2px;
    }

    .settings-fonts {
      display: flex;
      flex-direction: column;
      gap: 5px;
      margin-top: 4px;
    }

    .settings-font-opt {
      text-align: left;
      border: 1px solid #d5deeb;
      border-radius: 8px;
      padding: 7px 10px;
      background: #ffffff;
      cursor: pointer;
      font-size: 0.82rem;
      color: var(--text);
      transition: background 100ms ease, border-color 100ms ease;
    }

    .settings-font-opt:hover {
      background: #f0f5fc;
    }

    .settings-font-opt[aria-pressed="true"] {
      border-color: var(--accent);
      background: #eaf3ff;
      color: var(--accent);
      font-weight: 600;
    }

    .settings-font-opt:focus-visible {
      outline: 3px solid var(--focus-ring);
      outline-offset: 1px;
    }

    .settings-reset {
      margin-top: 6px;
      font-size: 0.72rem;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px 0;
      text-align: left;
      text-decoration: underline;
      font-family: var(--slide-font);
    }

    .settings-reset:hover {
      color: var(--text);
    }

    .settings-reset:focus-visible {
      outline: 3px solid var(--focus-ring);
      outline-offset: 2px;
    }

    .delimiter-toggle {
      border: 0;
      border-radius: 999px;
      background: #ffffff;
      color: #2e3c54;
      width: 44px;
      height: 44px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(21, 34, 54, 0.14);
      transition: transform 120ms ease, box-shadow 120ms ease;
    }

    .delimiter-toggle:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 22px rgba(21, 34, 54, 0.18);
    }

    .delimiter-toggle:focus-visible {
      outline: 3px solid var(--focus-ring);
      outline-offset: 2px;
    }

    .delimiter-toggle .material-symbols-outlined {
      font-size: 24px;
      line-height: 1;
    }

    .delimiter-panel {
      position: fixed;
      left: 0;
      top: 0;
      transform: none;
      z-index: 56;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 8px;
      background: #ffffff;
      border: 1px solid #d5deeb;
      border-radius: 10px;
      padding: 8px;
      min-width: 360px;
      max-width: min(520px, calc(100vw - 24px));
      max-height: calc(100vh - 24px);
      overflow: auto;
      box-shadow: 0 14px 28px rgba(21, 34, 54, 0.2), 0 0 0 3px rgba(255, 255, 255, 0.95);
    }

    .delimiter-panel[hidden] {
      display: none;
    }

    .delimiter-quick {
      display: flex;
      align-items: center;
      gap: 6px;
      border: 1px solid #dce4f0;
      border-radius: 10px;
      padding: 8px;
      background: #f8fbff;
    }

    .delimiter-group {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .delimiter-label {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: #5d6c84;
      padding: 0 2px;
      text-transform: uppercase;
      user-select: none;
    }

    .delimiter-sep {
      width: 1px;
      height: 22px;
      background: #dde4f0;
      margin: 0 2px;
    }

    .delimiter-option {
      border: 1px solid #c7d3e5;
      border-radius: 7px;
      background: #fff;
      color: #23324a;
      font-size: 0.8rem;
      padding: 4px 8px;
      height: 30px;
      min-width: 44px;
      cursor: pointer;
    }

    .delimiter-option[aria-pressed="true"] {
      border-color: #7ea9d6;
      background: #eef5ff;
      color: #174777;
      font-weight: 700;
    }

    .delimiter-option:focus-visible {
      outline: 3px solid var(--focus-ring);
      outline-offset: 1px;
    }

    .delimiter-fields {
      display: grid;
      gap: 6px;
      border: 1px solid #dce4f0;
      border-radius: 10px;
      padding: 8px;
      background: #ffffff;
    }

    .delimiter-field {
      display: grid;
      grid-template-columns: 70px 1fr;
      align-items: center;
      gap: 8px;
    }

    .delimiter-field label {
      font-size: 0.76rem;
      font-weight: 700;
      color: #56657e;
      text-transform: uppercase;
    }

    .delimiter-field input {
      border: 1px solid #c7d3e5;
      border-radius: 8px;
      height: 30px;
      padding: 4px 8px;
      font-size: 0.82rem;
      color: #23324a;
      width: 150px;
      background: #fdfefe;
    }

    .delimiter-field input:focus-visible {
      outline: 3px solid var(--focus-ring);
      outline-offset: 1px;
      border-color: #7ea9d6;
    }

    .delimiter-actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 2px;
    }

    .delimiter-section-title {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      color: #60708a;
      text-transform: uppercase;
      margin-bottom: 4px;
      user-select: none;
    }

    .delimiter-apply {
      border: 0;
      border-radius: 8px;
      background: #1c7ed6;
      color: #ffffff;
      font-size: 0.8rem;
      font-weight: 700;
      height: 32px;
      padding: 0 12px;
      cursor: pointer;
    }

    .delimiter-apply:hover {
      background: #176ab5;
    }

    .delimiter-apply:focus-visible {
      outline: 3px solid var(--focus-ring);
      outline-offset: 1px;
    }

    /* ── Delimiter panel: Markdown format guide section ── */
    .delimiter-guide {
      border-top: 1px solid #dce4f0;
      padding-top: 8px;
      margin-top: 2px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .delimiter-guide:empty {
      display: none;
    }

    .delimiter-guide-pre {
      margin: 0;
      background: #edf3fa;
      border: 1px solid #d7e1ef;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 0.72rem;
      line-height: 1.55;
      font-family: ui-monospace, "SF Mono", "Fira Code", "Cascadia Code", monospace;
      white-space: pre;
      overflow-x: auto;
      color: #2a3748;
    }

    .delimiter-guide-legend {
      margin: 0;
      padding: 0;
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 0.76rem;
      color: #3e4c64;
    }

    .delimiter-guide-legend code {
      background: #e4edf8;
      border-radius: 4px;
      padding: 0.05em 0.3em;
      font-size: 0.78rem;
      font-family: ui-monospace, "SF Mono", "Fira Code", "Cascadia Code", monospace;
      color: #174777;
    }

    .arrows-toggle {
      position: fixed;
      right: 16px;
      bottom: 118px;
      border: 0;
      border-radius: 999px;
      background: #ffffff;
      color: #2e3c54;
      width: 44px;
      height: 44px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(21, 34, 54, 0.14);
      transition: transform 120ms ease, box-shadow 120ms ease;
    }

    .arrows-toggle:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 22px rgba(21, 34, 54, 0.18);
    }

    .arrows-toggle:focus-visible {
      outline: 3px solid var(--focus-ring);
      outline-offset: 2px;
    }

    .arrows-toggle .material-symbols-outlined {
      font-size: 24px;
      line-height: 1;
    }

    .nav-arrow {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      border: 0;
      border-radius: 999px;
      width: 46px;
      height: 46px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.95);
      color: #2b3a52;
      box-shadow: 0 8px 20px rgba(21, 34, 54, 0.16);
      cursor: pointer;
      z-index: 50;
    }

    .nav-arrow[hidden] {
      display: none;
    }

    .nav-arrow.left {
      left: 14px;
    }

    .nav-arrow.right {
      right: 14px;
    }

    .nav-arrow:focus-visible {
      outline: 3px solid var(--focus-ring);
      outline-offset: 2px;
    }

    .nav-arrow .material-symbols-outlined {
      font-size: 24px;
      line-height: 1;
    }

    .nav-arrow:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .search-panel {
      position: fixed;
      right: 68px;
      bottom: 66px;
      z-index: 60;
      display: flex;
      align-items: center;
      gap: 6px;
      background: #ffffff;
      border: 1px solid #d5deeb;
      border-radius: 12px;
      box-shadow: 0 10px 24px rgba(21, 34, 54, 0.16);
      padding: 8px;
      max-width: min(520px, calc(100vw - 84px));
    }

    .search-panel[hidden] {
      display: none;
    }

    .search-input {
      width: min(260px, 52vw);
      border: 1px solid #c6d2e4;
      border-radius: 8px;
      padding: 8px 9px;
      font-size: 0.9rem;
      color: #1f2b3f;
    }

    .search-input:focus-visible {
      outline: 3px solid var(--focus-ring);
      outline-offset: 1px;
      border-color: #7ea9d6;
    }

    .search-count {
      min-width: 58px;
      text-align: center;
      font-size: 0.78rem;
      color: #49586f;
      font-weight: 600;
      padding: 0 4px;
    }

    .search-nav {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      border: 1px solid #c9d4e5;
      background: #fff;
      color: #2f3d55;
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
    }

    .search-nav:focus-visible {
      outline: 3px solid var(--focus-ring);
      outline-offset: 1px;
    }

    .search-close {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      border: 1px solid #c9d4e5;
      background: #fff;
      color: #2f3d55;
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
    }

    .search-close:focus-visible {
      outline: 3px solid var(--focus-ring);
      outline-offset: 1px;
    }

    /* ── Load from URL panel ── */
    .url-load-panel {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 60;
      display: flex;
      flex-direction: column;
      gap: 6px;
      background: #ffffff;
      border: 1px solid #d5deeb;
      border-radius: 12px;
      box-shadow: 0 10px 24px rgba(21, 34, 54, 0.16);
      padding: 10px;
      max-width: min(420px, calc(100vw - 84px));
    }

    .url-load-panel[hidden] {
      display: none;
    }

    .url-load-panel-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .url-load-input {
      flex: 1;
      min-width: 0;
      border: 1px solid #c6d2e4;
      border-radius: 8px;
      padding: 8px 9px;
      font-size: 0.9rem;
      color: #1f2b3f;
    }

    .url-load-input:focus-visible {
      outline: 3px solid var(--focus-ring);
      outline-offset: 1px;
      border-color: #7ea9d6;
    }

    .url-load-submit {
      padding: 0 14px;
      height: 34px;
      border-radius: 8px;
      border: 1px solid #1c7ed6;
      background: #1c7ed6;
      color: #ffffff;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .url-load-submit:hover {
      background: #1971c2;
      border-color: #1971c2;
    }

    .url-load-submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .url-load-submit:focus-visible {
      outline: 3px solid var(--focus-ring);
      outline-offset: 1px;
    }

    .url-load-close {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      border: 1px solid #c9d4e5;
      background: #fff;
      color: #2f3d55;
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
      flex-shrink: 0;
    }

    .url-load-close:focus-visible {
      outline: 3px solid var(--focus-ring);
      outline-offset: 1px;
    }

    .url-load-error {
      font-size: 0.8rem;
      color: #c0392b;
      padding: 2px 4px;
    }

    .url-load-error[hidden] {
      display: none;
    }

    .search-hit {
      background: #ffe7a3;
      color: inherit;
      border-radius: 2px;
      padding: 0;
    }

    .search-hit.is-active {
      background: #ffc94f;
    }

    .slide h1,
    .slide h2,
    .slide h3 {
      margin-top: 0;
      line-height: 1.12;
      letter-spacing: -0.01em;
    }

    .slide h1 {
      font-size: clamp(2rem, 3vw, 3.2rem);
    }

    .slide h2 {
      font-size: clamp(1.6rem, 2.4vw, 2.4rem);
    }

    .slide h3 {
      font-size: clamp(1.3rem, 1.8vw, 1.7rem);
    }

    .slide p,
    .slide li,
    .slide blockquote,
    .slide pre {
      margin: 0 0 0.8em;
    }

    .slide ul,
    .slide ol {
      padding-left: 1.4em;
    }

    .slide code {
      background: #ebf1f8;
      border-radius: 6px;
      padding: 0.08em 0.34em;
      font-size: 0.9em;
    }

    .slide pre {
      background: #edf3fa;
      border: 1px solid #d7e1ef;
      border-radius: 10px;
      padding: 0.9em;
      overflow: auto;
    }

    .slide pre code {
      background: transparent;
      padding: 0;
    }

    .slide-content img {
      max-width: 100%;
      max-height: 65vh;
      height: auto;
      object-fit: contain;
      display: block;
    }

    .slide blockquote {
      margin-left: 0;
      padding-left: 0.9em;
      border-left: 4px solid #cfe2fa;
      color: #3e4c64;
    }

    .slide table {
      width: 100%;
      border-collapse: collapse;
      margin: 0 0 0.8em;
    }

    .slide th,
    .slide td {
      border: 1px solid #d7e1ef;
      padding: 8px 10px;
      text-align: left;
      vertical-align: top;
    }

    .slide thead th {
      background: #f3f7fd;
      font-weight: 700;
    }

    .slide mark {
      background: #fff1bf;
      color: inherit;
      padding: 0 0.12em;
      border-radius: 4px;
    }

    .empty {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      height: 100%;
      text-align: center;
      color: var(--muted);
      font-size: clamp(1rem, 1.2vw, 1.2rem);
      padding-top: clamp(20px, 8vh, 96px);
    }

    .empty strong {
      display: block;
      font-size: clamp(1.2rem, 1.9vw, 1.52rem);
      color: var(--text);
      margin-bottom: 12px;
    }

    .empty-flow {
      margin-top: 4px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
      border: 1px solid #d7e1ef;
      border-radius: 14px;
      background: #ffffff;
      padding: 8px;
    }

    .empty-step {
      min-width: 180px;
      border: 1px solid #bacbe2;
      border-radius: 12px;
      background: #ffffff;
      padding: 10px 12px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #31445f;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 120ms ease, border-color 120ms ease, box-shadow 120ms ease;
    }

    .empty-step.primary {
      background: #1c7ed6;
      border-color: #1c7ed6;
      color: #ffffff;
      box-shadow: 0 6px 16px rgba(28, 126, 214, 0.2);
    }

    .empty-step.primary .empty-step-index {
      background: rgba(255, 255, 255, 0.24);
      color: #ffffff;
    }

    .empty-step.primary .material-symbols-outlined {
      color: #ffffff;
    }

    .empty-step:hover {
      transform: translateY(-1px);
      border-color: #b8c8de;
      box-shadow: 0 4px 10px rgba(21, 34, 54, 0.08);
    }

    .empty-step:focus-visible {
      outline: 3px solid var(--focus-ring);
      outline-offset: 2px;
    }

    .empty-step-index {
      width: 20px;
      height: 20px;
      border-radius: 999px;
      background: #eaf3ff;
      color: #1c5fa0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.72rem;
      font-weight: 700;
      flex: 0 0 20px;
    }

    .empty-step .material-symbols-outlined {
      font-size: 19px;
      line-height: 1;
      color: #3f5f86;
    }

    .empty-flow-arrow {
      color: #8595ac;
      font-size: 0.95rem;
      font-weight: 700;
      user-select: none;
    }

    .embed-warning {
      margin-top: 14px;
      padding: 10px 12px;
      border: 1px solid #f2d6a8;
      border-radius: 10px;
      background: #fff6e7;
      color: #7a5a20;
      font-size: 0.9rem;
    }

    .media-warning {
      margin-top: 8px;
      padding: 8px 10px;
      border: 1px solid #e8d3a1;
      border-radius: 8px;
      background: #fff8ea;
      color: #6f5421;
      font-size: 0.85rem;
    }

    .callout {
      margin: 0 0 0.9em;
      border: 1px solid #d6e4f6;
      border-left-width: 5px;
      border-radius: 10px;
      background: #f7fbff;
      padding: 0.7em 0.9em 0.75em;
    }

    .callout-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      margin-bottom: 0.35em;
      text-transform: capitalize;
      color: #25456c;
    }

    .callout-title::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: currentColor;
      opacity: 0.8;
    }

    .callout.is-collapsed > :not(.callout-title) {
      display: none;
    }

    .callout.is-foldable .callout-title {
      cursor: pointer;
      user-select: none;
    }

    .callout.callout-note {
      border-color: #cfe0f9;
      background: #f4f9ff;
    }

    .callout.callout-tip {
      border-color: #cae9d4;
      background: #f3fbf6;
    }

    .callout.callout-success {
      border-color: #bfe7c7;
      background: #eefaf1;
    }

    .callout.callout-warning {
      border-color: #f3dfb2;
      background: #fff9ed;
    }

    .callout.callout-danger {
      border-color: #f1c6cb;
      background: #fff3f4;
    }

    .callout.callout-info {
      border-color: #cde6f2;
      background: #f3fbff;
    }

    .callout.callout-question {
      border-color: #d8cef2;
      background: #f7f3ff;
    }

    .callout.callout-example {
      border-color: #e3d3c0;
      background: #fbf6ef;
    }

    .callout.callout-quote {
      border-color: #d7dbe3;
      background: #f8f9fc;
    }

    .slide .md-tag {
      display: inline-block;
      padding: 0 0.35em;
      border-radius: 999px;
      background: #eaf3ff;
      color: #1c5fa0;
      font-size: 0.9em;
      line-height: 1.4;
    }

    .slide .internal-anchor {
      text-decoration-thickness: 1px;
    }

    a:focus-visible {
      outline: 2px solid var(--focus-ring);
      outline-offset: 2px;
      border-radius: 3px;
    }

    .slide .footnotes {
      margin-top: 1.4em;
      padding-top: 0.8em;
      border-top: 1px solid #d7e1ef;
      color: #43526c;
      font-size: 0.9em;
    }

    .slide .footnotes ol {
      margin: 0.4em 0 0;
      padding-left: 1.2em;
    }

    .slide .footnote-ref a {
      text-decoration: none;
      font-size: 0.85em;
    }

    .slide .mermaid {
      margin: 0 0 0.8em;
      overflow: auto;
    }

    #fileInput {
      display: none;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }

      .upload-cta:hover,
      .map-toggle:hover:not(:disabled),
      .duration-bar-toggle:hover:not(:disabled),
      .search-toggle:hover,
      .zoom-toggle:hover,
      .delimiter-toggle:hover,
      .arrows-toggle:hover,
      .station:hover,
      .station.active {
        transform: none !important;
      }

      .slide-duration-bar-track {
        display: none;
      }
    }

    @media (max-width: 700px) {
      .empty {
        padding-top: clamp(12px, 4vh, 44px);
      }

      .empty-flow {
        flex-direction: column;
        align-items: stretch;
      }

      .empty-step {
        width: 100%;
        min-width: 0;
        justify-content: center;
      }

      .empty-flow-arrow {
        transform: rotate(90deg);
      }
    }
  </style>
</head>
<body>
  <a class="skip-link" href="#slide">Skip to slide content</a>
  <main class="app">
    <h1 class="app-title">Markdown Slide Deck</h1>
    <input id="fileInput" type="file" accept=".md,.markdown,text/markdown,text/plain" />
    <article id="slide" class="slide" aria-live="polite" aria-atomic="true" role="region" aria-label="Slide content" tabindex="-1"></article>
    <nav id="trainMap" class="train-map" aria-label="Slide train map"></nav>
    <div id="durationBar" class="duration-bar" hidden></div>
    <footer class="app-footer">
      <a class="repo-link" href="https://github.com/jourde/markdown-html-slidedeck" target="_blank" rel="noopener noreferrer">View on GitHub</a>
    </footer>
  </main>
  <button id="mapToggle" class="map-toggle" type="button" aria-label="Show or hide route line" title="Show or hide route line" aria-controls="trainMap" aria-expanded="false">
    <span class="material-symbols-outlined" aria-hidden="true">route</span>
  </button>
  <button id="globalDurationBarToggle" class="global-duration-bar-toggle" type="button" aria-label="Show or hide global duration bar" title="Show or hide global duration bar" aria-pressed="false" hidden>
    <span class="material-symbols-outlined" aria-hidden="true">timer</span>
  </button>
  <button id="durationBarToggle" class="duration-bar-toggle" type="button" aria-label="Show or hide duration bar" title="Show or hide duration bar" aria-pressed="false" hidden>
    <span class="material-symbols-outlined" aria-hidden="true">hourglass_empty</span>
  </button>
  <section id="delimiterPanel" class="delimiter-panel" role="group" aria-label="Delimiter choices" hidden>
    <div>
      <div class="delimiter-section-title">Quick Buttons</div>
      <div class="delimiter-quick">
        <div class="delimiter-group" role="group" aria-label="Slide marker options">
          <span class="delimiter-label">Slides</span>
          <button class="delimiter-option" type="button" data-kind="slide" data-delimiter="---" aria-pressed="true">---</button>
          <button class="delimiter-option" type="button" data-kind="slide" data-delimiter="===" aria-pressed="false">===</button>
          <button class="delimiter-option" type="button" data-kind="slide-mode" data-mode="h1" aria-pressed="false"># H1</button>
        </div>
        <span class="delimiter-sep" aria-hidden="true"></span>
        <div class="delimiter-group" role="group" aria-label="Speaker notes marker options">
          <span class="delimiter-label">Notes</span>
          <button class="delimiter-option" type="button" data-kind="notes" data-delimiter="--" aria-pressed="true">--</button>
          <button class="delimiter-option" type="button" data-kind="notes" data-delimiter="notes:" aria-pressed="false">notes:</button>
        </div>
      </div>
    </div>
    <div>
      <div class="delimiter-section-title">Custom Fields</div>
      <div class="delimiter-fields">
        <div class="delimiter-field">
          <label for="slideDelimiterInput">Slides</label>
          <input id="slideDelimiterInput" type="text" value="---" aria-label="Slide delimiter value" />
        </div>
        <div class="delimiter-field">
          <label for="notesDelimiterInput">Notes</label>
          <input id="notesDelimiterInput" type="text" value="--" aria-label="Speaker notes delimiter value" />
        </div>
      </div>
    </div>
    <div class="delimiter-actions">
      <button id="delimiterApply" class="delimiter-apply" type="button">Apply</button>
    </div>
    <!-- Markdown format reference — populated by renderDelimiterUI() -->
    <div id="delimiterGuide" class="delimiter-guide" aria-live="polite"></div>
  </section>
  <button id="arrowsToggle" class="arrows-toggle" type="button" aria-label="Show or hide navigation arrows" title="Show or hide navigation arrows" aria-controls="prevArrow nextArrow" aria-expanded="false">
    <span class="material-symbols-outlined" aria-hidden="true">swap_horiz</span>
  </button>
  <button id="searchToggle" class="search-toggle" type="button" aria-label="Search slides" title="Search slides" aria-controls="searchPanel" aria-expanded="false">
    <span class="material-symbols-outlined" aria-hidden="true">search</span>
  </button>
  <button id="exportToggle" class="export-toggle" type="button" aria-label="Export as HTML" title="Export as HTML" hidden>
    <span class="material-symbols-outlined" aria-hidden="true">download</span>
  </button>
  <button id="fullscreenToggle" class="fullscreen-toggle" type="button" aria-label="Enter fullscreen" title="Enter fullscreen (F)">
    <span class="material-symbols-outlined" aria-hidden="true">fullscreen</span>
  </button>
  <button id="zoomToggle" class="zoom-toggle" type="button" aria-label="Slide zoom" title="Slide zoom" aria-controls="zoomPanel" aria-expanded="false">
    <span class="material-symbols-outlined" aria-hidden="true">zoom_in</span>
  </button>
  <button id="settingsToggle" class="settings-toggle" type="button" aria-label="Interface settings" title="Interface settings" aria-controls="settingsPanel" aria-expanded="false">
    <span class="material-symbols-outlined" aria-hidden="true">tune</span>
  </button>
  <button id="prevArrow" class="nav-arrow left" type="button" aria-label="Previous slide" hidden>
    <span class="material-symbols-outlined" aria-hidden="true">chevron_left</span>
  </button>
  <button id="nextArrow" class="nav-arrow right" type="button" aria-label="Next slide" hidden>
    <span class="material-symbols-outlined" aria-hidden="true">chevron_right</span>
  </button>
  <section id="searchPanel" class="search-panel" role="search" aria-label="Slide search" hidden>
    <label class="sr-only" for="searchInput">Search slides</label>
    <input id="searchInput" class="search-input" type="text" autocomplete="off" placeholder="Search slides..." />
    <div id="searchCount" class="search-count" aria-live="polite">0 / 0</div>
    <button id="searchPrev" class="search-nav" type="button" aria-label="Previous match">↑</button>
    <button id="searchNext" class="search-nav" type="button" aria-label="Next match">↓</button>
    <button id="searchClose" class="search-close" type="button" aria-label="Close search">✕</button>
  </section>
  <section id="settingsPanel" class="settings-panel" role="region" aria-label="Interface settings" hidden>
    <div class="delimiter-section-title">Background</div>

  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
  <script>
    const state = {

    const settingsFontsEl = settingsPanelEl?.querySelector(".settings-fonts");

    const searchToggleEl = document.getElementById("searchToggle");
    const searchPanelEl = document.getElementById("searchPanel");
    const searchInputEl = document.getElementById("searchInput");
    const searchCountEl = document.getElementById("searchCount");
    const searchPrevEl = document.getElementById("searchPrev");

    const BG_PRESETS = {
      cloud:    { a: "#ffffff", b: "#f2f5fa" },
      warm:     { a: "#fffaf5", b: "#f5ede0" },
      sage:     { a: "#f5f9f5", b: "#e8f2e8" },
      slate:    { a: "#f4f8fc", b: "#e4eef8" },
      lavender: { a: "#f8f5fc", b: "#ede4f7" },

    };

    const FONT_PRESETS = {
      sans:  { label: "Sans-serif", stack: '"Avenir Next", "Segoe UI", "Helvetica Neue", sans-serif' },
      serif: { label: "Serif",      stack: 'Georgia, "Times New Roman", serif' },
      round: { label: "Rounded",    stack: '"Trebuchet MS", "Gill Sans", sans-serif' },
      mono:  { label: "Monospace",  stack: 'ui-monospace, "SF Mono", "Fira Code", monospace' },
    };

    const ZOOM_LEVELS = [0.8, 0.9, 1, 1.1, 1.25, 1.5];
    const SETTINGS_DEFAULTS = { bg: "cloud", font: "sans", zoom: 1 };
    const SETTINGS_KEY = "slidedeckSettings";
    const appSettings = { ...SETTINGS_DEFAULTS };
    let delimiterAnchorEl = null;
    let zoomAnchorEl = null;

    function announceStatus(message) {
      if (!srStatusEl) {
        return;
      }
      srStatusEl.textContent = "";
      window.requestAnimationFrame(() => {
        srStatusEl.textContent = message;
      });
    }

    function escapeHtml(input) {
      return input
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    if (window.marked) {
      window.marked.setOptions({
        gfm: true,
        breaks: false,
        headerIds: false,
        mangle: false
      });
    }

    if (window.mermaid) {
      window.mermaid.initialize({
        startOnLoad: false,
        securityLevel: "loose",
        theme: "default"
      });
    }

    function slugify(value) {
      return String(value || "")
        .toLowerCase()
        .trim()
        .replace(/[^\w\s-]/g, "")
        .replace(/\s+/g, "-");
    }

    function parseDuration(str) {
      const s = String(str || "").trim().toLowerCase();
      const full = s.match(/^(?:(\d+)h)?(?:(\d+)m)?(?:(\d+)s)?$/);
      if (full && (full[1] || full[2] || full[3])) {
        return (parseInt(full[1] || 0, 10) * 3600)
          + (parseInt(full[2] || 0, 10) * 60)
          + parseInt(full[3] || 0, 10);
      }
      const colon = s.match(/^(\d+):(\d{2})$/);
      if (colon) {
        return parseInt(colon[1], 10) * 60 + parseInt(colon[2], 10);
      }
      return null;
    }

    function formatDuration(totalSeconds) {
      const m = Math.floor(totalSeconds / 60);
      const s = totalSeconds % 60;
      return s ? `${m}:${String(s).padStart(2, "0")}` : `${m}m`;
    }

    function extractFrontmatter(markdown) {
      const normalized = markdown.replace(/\r\n?/g, "\n");
      if (!normalized.startsWith("---\n")) {
        return { content: normalized, metadata: {} };
      }

      const endIndex = normalized.indexOf("\n---\n", 4);
      if (endIndex === -1) {
        return { content: normalized, metadata: {} };
      }

      const frontmatterText = normalized.slice(4, endIndex).trim();
      const body = normalized.slice(endIndex + 5);
      const metadata = {};
      frontmatterText.split("\n").forEach((line) => {
        const match = line.match(/^([A-Za-z0-9_-]+)\s*:\s*(.*)$/);
        if (match) {
          metadata[match[1]] = match[2].trim();
        }
      });
      return { content: body, metadata };
    }

    function markdownToHtml(markdown) {
      const normalized = markdown.replace(/\r\n?/g, "\n");
      if (window.marked && typeof window.marked.parse === "function") {
        return window.marked.parse(normalized);
      }
      return `<pre>${escapeHtml(normalized)}</pre>`;
    }

    function transformFootnotes(markdown) {
      const lines = markdown.split("\n");
      const definitions = {};
      const skip = new Set();
      let inCode = false;

      for (let i = 0; i < lines.length; i += 1) {
        const line = lines[i];
        if (/^```/.test(line.trim())) {
          inCode = !inCode;
          continue;
        }
        if (inCode) {
          continue;
        }

        const match = line.match(/^\[\^([^\]]+)\]:\s*(.*)$/);
        if (!match) {
          continue;
        }

        const id = match[1];
        const parts = [match[2]];
        skip.add(i);
        let j = i + 1;
        while (j < lines.length && (/^\s{2,}/.test(lines[j]) || /^\t/.test(lines[j]))) {
          parts.push(lines[j].replace(/^\s{1,4}/, ""));
          skip.add(j);
          j += 1;
        }
        definitions[id] = parts.join("\n").trim();
        i = j - 1;
      }

      const body = lines.filter((_, idx) => !skip.has(idx)).join("\n");
      const usedOrder = [];
      const textWithRefs = body.replace(/\[\^([^\]]+)\]/g, (full, id) => {
        if (!definitions[id]) {
          return full;
        }
        if (!usedOrder.includes(id)) {
          usedOrder.push(id);
        }
        const number = usedOrder.indexOf(id) + 1;
        const slug = slugify(id);
        return `<sup class="footnote-ref"><a href="#fn-${slug}" id="fnref-${slug}">${number}</a></sup>`;
      });

      if (!usedOrder.length) {
        return textWithRefs;
      }

      const items = usedOrder.map((id) => {
        const slug = slugify(id);
        const raw = definitions[id] || "";
        const rendered = window.marked && typeof window.marked.parseInline === "function"
          ? window.marked.parseInline(raw)
          : escapeHtml(raw);
        return `<li id="fn-${slug}">${rendered} <a href="#fnref-${slug}" aria-label="Back to reference">↩</a></li>`;
      }).join("");

      return `${textWithRefs}\n\n<section class="footnotes"><ol>${items}</ol></section>`;
    }

    function applyObsidianSyntax(markdown) {
      let text = markdown.replace(/\r\n?/g, "\n");

      // Obsidian comments
      text = text.replace(/%%[\s\S]*?%%/g, "");

      // Internal anchors: [[Note#Heading]] or [[#Heading]] (+ optional alias)
      text = text.replace(/\[\[(?:([^#\]|]+))?#([^\]|]+)(?:\|([^\]]+))?\]\]/g, (_, rawNote, rawHeading, rawAlias) => {
        const note = String(rawNote || "").trim();
        const heading = String(rawHeading || "").trim();
        const alias = String(rawAlias || heading).trim();
        const anchor = slugify(heading);
        const noteAttr = note ? ` data-note="${note.replace(/"/g, "&quot;")}"` : "";
        return `<a class="internal-anchor" href="#${anchor}"${noteAttr}>${alias}</a>`;
      });

      // ==highlight==
      text = text.replace(/==([^\n=][^=\n]*?)==/g, "<mark>$1</mark>");

      // x^2^ and H~2~ style markers
      text = text.replace(/\^([^\^\s][^\^]*?)\^/g, "<sup>$1</sup>");
      text = text.replace(/~([^~\s][^~]*?)~/g, "<sub>$1</sub>");

      return transformFootnotes(text);
    }

    function splitSlidesByH1(content) {
      const lines = content.replace(/\r\n?/g, "\n").split("\n");
      const slides = [];
      let current = [];
      let inFence = false;
      let fenceChar = "";

      const pushCurrent = () => {
        const chunk = current.join("\n").trim();
        if (chunk) {
          slides.push(chunk);
        }
      };

      for (let i = 0; i < lines.length; i += 1) {
        const line = lines[i];
        const trimmed = line.trim();
        const fenceMatch = trimmed.match(/^(```+|~~~+)/);

        if (fenceMatch) {
          const marker = fenceMatch[1];
          const markerChar = marker[0];
          if (!inFence) {
            inFence = true;
            fenceChar = markerChar;
          } else if (fenceChar === markerChar) {
            inFence = false;
            fenceChar = "";
          }
          current.push(line);
          continue;
        }

        const isH1 = !inFence && /^\s{0,3}#\s+.+$/.test(line);
        if (isH1) {
          pushCurrent();
          current = [line];
          continue;
        }
        current.push(line);
      }

      pushCurrent();
      return slides;
    }

    function parseSlides(markdown) {
      const { content, metadata } = extractFrontmatter(markdown);
      state.frontmatter = metadata;
      const slideSplitMode = state.slideSplitMode === "h1" ? "h1" : "delimiter";
      const slideDelimiter = state.slideDelimiter || "---";
      const notesDelimiter = String(state.notesDelimiter || "");
      const slideEscaped = slideDelimiter.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
      const splitRegex = new RegExp(`^${slideEscaped}\\s*$`, "m");
      const notesEscaped = notesDelimiter ? notesDelimiter.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") : null;
      const notesRegex = notesEscaped
        ? new RegExp(`^${notesEscaped}\\s*$`, "m")
        : null;
      const notesDurationRegex = notesEscaped
        ? new RegExp(`^(${notesEscaped})[ \\t]+duration:\\s*([^\\n]*)$`, "im")
        : null;

      const rawSlides = slideSplitMode === "h1"
        ? splitSlidesByH1(content)
        : content
          .split(splitRegex)
          .map((chunk) => chunk.trim())
          .filter(Boolean);

      return rawSlides.map((raw) => {
        let duration = null;
        const rawForSplit = notesDurationRegex
          ? raw.replace(notesDurationRegex, (_, delim, val) => {
              duration = parseDuration(val.trim());
              return delim;
            })
          : raw;

        const noteSeparator = notesRegex ? rawForSplit.split(notesRegex) : [rawForSplit];
        const content = noteSeparator[0].trim();
        const enhanced = applyObsidianSyntax(content);
        return {
          content,
          notes: noteSeparator.slice(1).join("\n").trim(),
          html: markdownToHtml(enhanced),
          duration
        };
      });
    }

    function assignHeadingIds() {
      const contentRoot = slideEl.querySelector(".slide-content");
      if (!contentRoot) {
        return;
      }
      const seen = new Map();
      contentRoot.querySelectorAll("h1, h2, h3, h4, h5, h6").forEach((heading) => {
        if (heading.id) {
          return;
        }
        const base = slugify(heading.textContent || "section") || "section";
        const count = seen.get(base) || 0;
        seen.set(base, count + 1);
        heading.id = count ? `${base}-${count + 1}` : base;
      });
    }

    function configureEmbeds() {
      const contentRoot = slideEl.querySelector(".slide-content");
      if (!contentRoot) {
        return;
      }

      const iframes = Array.from(contentRoot.querySelectorAll("iframe"));
      const isFileProtocol = window.location.protocol === "file:";
      let hasYouTubeEmbed = false;

      iframes.forEach((iframe) => {
        const rawSrc = iframe.getAttribute("src") || "";
        if (!rawSrc) {
          return;
        }

        let url;
        try {
          url = new URL(rawSrc, window.location.href);
        } catch {
          return;
        }

        const host = url.hostname.toLowerCase();
        const isYouTube =
          host.includes("youtube.com") ||
          host.includes("youtu.be") ||
          host.includes("youtube-nocookie.com");

        if (!isYouTube) {
          return;
        }

        hasYouTubeEmbed = true;
        iframe.referrerPolicy = "origin-when-cross-origin";
        iframe.setAttribute("allowfullscreen", "");

        if (window.location.protocol.startsWith("http") && !url.searchParams.get("origin")) {
          url.searchParams.set("origin", window.location.origin);
        }

        if (host.includes("youtube.com") && !host.includes("youtube-nocookie.com")) {
          url.hostname = "www.youtube-nocookie.com";
        }

        iframe.src = url.toString();
      });

      if (isFileProtocol && hasYouTubeEmbed) {
        const warning = document.createElement("div");
        warning.className = "embed-warning";
        warning.textContent = "YouTube embed may fail in file:// mode (Error 153). Serve this app over http://localhost to enable it.";
        contentRoot.appendChild(warning);
      }
    }

    function enhanceMediaAccessibility() {
      const contentRoot = slideEl.querySelector(".slide-content");
      if (!contentRoot) {
        return;
      }

      const iframes = Array.from(contentRoot.querySelectorAll("iframe"));
      iframes.forEach((iframe, index) => {
        if (!iframe.getAttribute("title")) {
          iframe.setAttribute("title", `Embedded media ${index + 1}`);
        }
      });

      const videos = Array.from(contentRoot.querySelectorAll("video"));
      videos.forEach((video, index) => {
        video.setAttribute("controls", "");
        if (!video.getAttribute("aria-label") && !video.getAttribute("title")) {
          video.setAttribute("aria-label", `Video ${index + 1}`);
        }

        const hasTrack = video.querySelector("track[kind='captions'], track[kind='subtitles']");
        if (!hasTrack) {
          const warning = document.createElement("div");
          warning.className = "media-warning";
          warning.textContent = "No captions or subtitles track detected for this video.";
          video.insertAdjacentElement("afterend", warning);
        }
      });
    }

    function enhanceCallouts() {
      const contentRoot = slideEl.querySelector(".slide-content");
      if (!contentRoot) {
        return;
      }

      const calloutTypeMap = {
        abstract: "info",
        summary: "info",
        tldr: "info",
        info: "info",
        todo: "note",
        note: "note",
        hint: "tip",
        important: "tip",
        tip: "tip",
        success: "success",
        check: "success",
        done: "success",
        question: "question",
        help: "question",
        faq: "question",
        warning: "warning",
        caution: "warning",
        attention: "warning",
        failure: "danger",
        fail: "danger",
        missing: "danger",
        danger: "danger",
        error: "danger",
        bug: "danger",
        example: "example",
        quote: "quote"
      };

      const blockquotes = Array.from(contentRoot.querySelectorAll("blockquote"));
      blockquotes.forEach((blockquote) => {
        const firstLineNode = blockquote.querySelector("p, div");
        if (!firstLineNode) {
          return;
        }

        const firstLineText = String(firstLineNode.textContent || "")
          .split(/\r?\n/)[0]
          .trim();
        const match = firstLineText.match(/^\s*\[!([A-Za-z-]+)\]([+-])?\s*(.*)$/i);
        if (!match) {
          return;
        }

        const rawType = match[1].toLowerCase();
        const type = calloutTypeMap[rawType] || rawType;
        const fold = match[2] || "";
        const customTitle = (match[3] || "").trim();
        const titleText = customTitle || type;

        blockquote.classList.add("callout", `callout-${type}`);
        if (fold) {
          blockquote.classList.add("is-foldable");
          if (fold === "-") {
            blockquote.classList.add("is-collapsed");
          }
        }

        const title = document.createElement("div");
        title.className = "callout-title";
        title.textContent = titleText;

        if (blockquote.firstElementChild === firstLineNode) {
          blockquote.insertBefore(title, firstLineNode);
        } else {
          blockquote.prepend(title);
        }

        const firstHtml = firstLineNode.innerHTML.replace(/^\s*\[![A-Za-z-]+\][+-]?\s*/i, "");
        if (firstHtml.trim()) {
          firstLineNode.innerHTML = firstHtml;
        } else {
          firstLineNode.remove();
        }

        if (fold) {
          title.setAttribute("tabindex", "0");
          title.setAttribute("role", "button");
          title.setAttribute("aria-expanded", String(!blockquote.classList.contains("is-collapsed")));
          title.addEventListener("click", () => {
            blockquote.classList.toggle("is-collapsed");
            title.setAttribute("aria-expanded", String(!blockquote.classList.contains("is-collapsed")));
          });
          title.addEventListener("keydown", (event) => {
            if (event.key === "Enter" || event.key === " ") {
              event.preventDefault();
              blockquote.classList.toggle("is-collapsed");
              title.setAttribute("aria-expanded", String(!blockquote.classList.contains("is-collapsed")));
            }
          });
        }
      });
    }

    function renderMath() {
      const contentRoot = slideEl.querySelector(".slide-content");
      if (!contentRoot || typeof window.renderMathInElement !== "function") {
        return;
      }

      window.renderMathInElement(contentRoot, {
        delimiters: [
          { left: "$$", right: "$$", display: true },
          { left: "$", right: "$", display: false }
        ],
        throwOnError: false
      });
    }

    function clearSearchHighlights() {
      const contentRoot = slideEl.querySelector(".slide-content");
      if (!contentRoot) {
        return;
      }
      const marks = Array.from(contentRoot.querySelectorAll("mark.search-hit"));
      marks.forEach((mark) => {
        const parent = mark.parentNode;
        if (!parent) {
          return;
        }
        parent.replaceChild(document.createTextNode(mark.textContent || ""), mark);
        parent.normalize();
      });
    }

    function updateSearchCount() {
      if (!searchCountEl) {
        return;
      }
      const total = state.search.results.length;
      if (!state.search.query.trim() || total === 0 || state.search.activeIndex < 0) {
        searchCountEl.textContent = "0 / 0";
        return;
      }
      searchCountEl.textContent = `${state.search.activeIndex + 1} / ${total}`;
    }

    function applySearchHighlights() {
      clearSearchHighlights();

      const query = state.search.query.trim();
      if (!query) {
        updateSearchCount();
        return;
      }

      const contentRoot = slideEl.querySelector(".slide-content");
      if (!contentRoot) {
        updateSearchCount();
        return;
      }

      const active = state.search.results[state.search.activeIndex];
      const activeOccurrence = active && active.slideIndex === state.index ? active.occurrence : -1;
      const qLower = query.toLowerCase();
      let occurrence = 0;
      let activeMark = null;

      const walker = document.createTreeWalker(contentRoot, NodeFilter.SHOW_TEXT);
      const targets = [];
      while (walker.nextNode()) {
        const node = walker.currentNode;
        const parent = node.parentElement;
        if (!parent) {
          continue;
        }
        if (parent.closest("script, style, pre, code, .katex, .mermaid, svg, math, textarea")) {
          continue;
        }
        if ((node.nodeValue || "").toLowerCase().includes(qLower)) {
          targets.push(node);
        }
      }

      targets.forEach((node) => {
        const text = node.nodeValue || "";
        const lower = text.toLowerCase();
        let cursor = 0;
        let idx = lower.indexOf(qLower, cursor);
        if (idx === -1) {
          return;
        }

        const frag = document.createDocumentFragment();
        while (idx !== -1) {
          if (idx > cursor) {
            frag.appendChild(document.createTextNode(text.slice(cursor, idx)));
          }
          const mark = document.createElement("mark");
          mark.className = "search-hit";
          mark.textContent = text.slice(idx, idx + query.length);
          occurrence += 1;
          if (occurrence === activeOccurrence) {
            mark.classList.add("is-active");
            activeMark = mark;
          }
          frag.appendChild(mark);
          cursor = idx + query.length;
          idx = lower.indexOf(qLower, cursor);
        }

        if (cursor < text.length) {
          frag.appendChild(document.createTextNode(text.slice(cursor)));
        }
        node.parentNode.replaceChild(frag, node);
      });

      if (activeMark) {
        activeMark.scrollIntoView({ block: "nearest", inline: "nearest" });
      }
      updateSearchCount();

    function buildDelimiterGuideHTML(slideMode, slideDelimiter, notesDelimiter) {
      const isH1 = slideMode === "h1";
      const notesDel = escapeHtml(notesDelimiter || "--");
      const slideDel = escapeHtml(slideDelimiter || "---");

      const exampleText = isH1
        ? `# Slide title        \u2190 each H1 starts a new slide\n\nContent here\u2026\n\n${notesDel} duration: 2m      \u2190 notes delimiter + optional duration\nSpeaker notes\u2026\n\n# Next slide\u2026`
        : `Slide title\n\nContent here\u2026\n\n${notesDel} duration: 2m      \u2190 notes delimiter + optional duration\nSpeaker notes\u2026\n\n${slideDel}\n\nNext slide\u2026`;

      const slideRule = isH1
        ? `<li><code># H1</code> starts a new slide</li>`
        : `<li><code>${slideDel}</code> separates slides</li>`;

      return `
        <div class="delimiter-section-title">Markdown format reference</div>
        <pre class="delimiter-guide-pre">${exampleText}</pre>
        <ul class="delimiter-guide-legend">

          <li><code>${notesDel}</code> separates slide content from speaker notes</li>

    function clampZoomLevel(value) {
      return ZOOM_LEVELS.includes(value) ? value : SETTINGS_DEFAULTS.zoom;

    function getCurrentZoomIndex() {
      return ZOOM_LEVELS.indexOf(appSettings.zoom);

    function updateZoomUI() {
      const zoomPercent = Math.round(appSettings.zoom * 100);
      if (zoomValueEl) {
        zoomValueEl.textContent = `${zoomPercent}%`;

      if (zoomToggleEl) {
        zoomToggleEl.title = `Slide zoom (${zoomPercent}%)`;

      }
      if (zoomOutEl) {
        zoomOutEl.disabled = getCurrentZoomIndex() <= 0;
      }
      if (zoomInEl) {
        zoomInEl.disabled = getCurrentZoomIndex() >= ZOOM_LEVELS.length - 1;
      }
      if (zoomResetEl) {
        zoomResetEl.disabled = appSettings.zoom === SETTINGS_DEFAULTS.zoom;

    function applyZoomToCurrentSlide() {
      const contentEl = slideEl.querySelector(".slide-content");

    function stepZoom(direction) {
      const currentIndex = getCurrentZoomIndex();
      if (currentIndex === -1) {
        return;
      }
      const nextIndex = Math.min(Math.max(currentIndex + direction, 0), ZOOM_LEVELS.length - 1);
      if (nextIndex !== currentIndex) {
        applySettings({ ...appSettings, zoom: ZOOM_LEVELS[nextIndex] });
        announceStatus(`Zoom ${Math.round(appSettings.zoom * 100)} percent.`);
      }
    }

    function resetZoom() {
      if (appSettings.zoom === SETTINGS_DEFAULTS.zoom) {
        return;
      }
      applySettings({ ...appSettings, zoom: SETTINGS_DEFAULTS.zoom });
      announceStatus("Zoom 100 percent.");
    }

    function applySettings({ bg, font, zoom }) {
      const bgPreset = BG_PRESETS[bg] || BG_PRESETS.cloud;
      const fontPreset = FONT_PRESETS[font] || FONT_PRESETS.sans;
      const root = document.documentElement.style;
      root.setProperty("--bg-a", bgPreset.a);
      root.setProperty("--bg-b", bgPreset.b);
      root.setProperty("--slide-font", fontPreset.stack);
      appSettings.bg = bg;
      appSettings.font = font;
      appSettings.zoom = clampZoomLevel(zoom);
      saveSettings();
      renderSettingsUI();
      applyZoomToCurrentSlide();

          zoom: appSettings.zoom

      } catch (_) {}

          if (parsed.font && FONT_PRESETS[parsed.font]) appSettings.font = parsed.font;

    function renderDelimiterUI() {
      delimiterOptionEls.forEach((option) => {
        const kind = option.dataset.kind;
        const activeMode = delimiterPanelEl.hidden ? state.slideSplitMode : delimiterDraft.slideMode;
        const activeSlide = delimiterPanelEl.hidden ? state.slideDelimiter : delimiterDraft.slide;
        const activeNotes = delimiterPanelEl.hidden ? state.notesDelimiter : delimiterDraft.notes;
        const selected = kind === "slide-mode"
          ? activeMode === "h1"
          : kind === "notes"
            ? option.dataset.delimiter === activeNotes
            : activeMode === "delimiter" && option.dataset.delimiter === activeSlide;
        option.setAttribute("aria-pressed", String(selected));
      });
      if (slideDelimiterInputEl) {
        slideDelimiterInputEl.value = delimiterPanelEl.hidden ? state.slideDelimiter : delimiterDraft.slide;
      }
      if (notesDelimiterInputEl) {

      if (delimiterGuideEl) {

    function positionDelimiterPanel(anchorEl) {
      if (!delimiterPanelEl || !anchorEl || delimiterPanelEl.hidden) {
        return;

      const rect = anchorEl.getBoundingClientRect();
      const panelRect = delimiterPanelEl.getBoundingClientRect();
      const margin = 12;
      const gap = 14;
      let left = rect.left;
      let top = rect.bottom + gap;

      const maxLeft = Math.max(margin, window.innerWidth - panelRect.width - margin);
      left = Math.min(Math.max(margin, left), maxLeft);

      const overBottom = top + panelRect.height > window.innerHeight - margin;
      if (overBottom) {
        top = rect.top - panelRect.height - gap;
      }
      top = Math.max(margin, top);

      delimiterPanelEl.style.left = `${Math.round(left)}px`;
      delimiterPanelEl.style.top = `${Math.round(top)}px`;

    function setDelimiterPanelOpen(open, anchorEl = null) {
      delimiterPanelEl.hidden = !open;
      if (open) {
        delimiterDraft.slideMode = state.slideSplitMode;
