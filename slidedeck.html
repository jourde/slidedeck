    function applyDelimiters(slideMode, slideDelimiter, notesDelimiter, announce = true) {
      const nextMode = slideMode === "h1" ? "h1" : "delimiter";
      const nextSlide = String(slideDelimiter || "").trim();
      if (nextMode === "delimiter" && !nextSlide) {
        announceStatus("Slide delimiter cannot be empty.");
        return false;
      }
      state.slideSplitMode = nextMode;
      if (nextSlide) {
        state.slideDelimiter = nextSlide;
      }
      state.notesDelimiter = String(notesDelimiter || "").trim();
      if (state.sourceMarkdown) {
        state.slides = parseSlides(state.sourceMarkdown);
        state.index = Math.min(state.index, Math.max(0, state.slides.length - 1));
      }
      renderSlide();
      if (announce) {
        const notesMarker = state.notesDelimiter || "none";
        if (state.slideSplitMode === "h1") {
          announceStatus(`Delimiters applied. Slide mode: H1 headings. Notes: ${notesMarker}.`);
        } else {
          announceStatus(`Delimiters applied. Slide mode: delimiter (${state.slideDelimiter}). Notes: ${notesMarker}.`);
        }
      }
      return true;
    }

    function rebuildSearchResults() {
      const query = state.search.query.trim().toLowerCase();
      state.search.results = [];
      state.search.activeIndex = -1;

      if (!query || !state.slides.length) {
        applySearchHighlights();
        return;
      }

      state.slides.forEach((slide, slideIndex) => {
        const text = String(slide.content || "").toLowerCase();
        let from = 0;
        let occurrence = 0;
        let at = text.indexOf(query, from);
        while (at !== -1) {
          occurrence += 1;
          state.search.results.push({ slideIndex, occurrence });
          from = at + query.length;
          at = text.indexOf(query, from);
        }
      });

      if (!state.search.results.length) {
        applySearchHighlights();
        announceStatus("No search results.");
        return;
      }

      const currentSlideResult = state.search.results.findIndex((item) => item.slideIndex === state.index);
      state.search.activeIndex = currentSlideResult >= 0 ? currentSlideResult : 0;
      goToSearchResult(state.search.activeIndex, false);
    }

    function goToSearchResult(index, announce = true) {
      const total = state.search.results.length;
      if (!total) {
        state.search.activeIndex = -1;
        updateSearchCount();
        return;
      }

      const nextIndex = ((index % total) + total) % total;
      state.search.activeIndex = nextIndex;
      const target = state.search.results[nextIndex];
      if (!target) {
        updateSearchCount();
        return;
      }

      if (state.index !== target.slideIndex) {
        state.index = target.slideIndex;
        renderSlide();
      } else {
        applySearchHighlights();
      }

      if (announce) {
        announceStatus(`Match ${nextIndex + 1} of ${total}, slide ${target.slideIndex + 1}.`);
      }
    }

    function goToNextSearchResult() {
      goToSearchResult(state.search.activeIndex + 1);
    }

    function goToPreviousSearchResult() {
      goToSearchResult(state.search.activeIndex - 1);
    }

    function enhanceTags() {
      const contentRoot = slideEl.querySelector(".slide-content");
      if (!contentRoot) {
        return;
      }

      const walker = document.createTreeWalker(contentRoot, NodeFilter.SHOW_TEXT);
      const targets = [];
      while (walker.nextNode()) {
        const node = walker.currentNode;
        const parent = node.parentElement;
        if (!parent) {
          continue;
        }
        if (parent.closest("pre, code, a, script, style, .katex, .mermaid")) {
          continue;
        }
        if (/(^|\s)#[A-Za-z][\w/-]*/.test(node.textContent || "")) {
          targets.push(node);
        }
      }

      targets.forEach((node) => {
        const text = node.textContent || "";
        const frag = document.createDocumentFragment();
        const regex = /(^|\s)(#[A-Za-z][\w/-]*)/g;
        let last = 0;
        let match;
        while ((match = regex.exec(text)) !== null) {
          const index = match.index;
          const leading = match[1] || "";
          const tag = match[2];
          const preText = text.slice(last, index);
          if (preText) {
            frag.appendChild(document.createTextNode(preText));
          }
          if (leading) {
            frag.appendChild(document.createTextNode(leading));
          }
          const span = document.createElement("span");
          span.className = "md-tag";
          span.textContent = tag;
          frag.appendChild(span);
          last = index + leading.length + tag.length;
        }
        const tail = text.slice(last);
        if (tail) {
          frag.appendChild(document.createTextNode(tail));
        }
        node.parentNode.replaceChild(frag, node);
      });
    }

    async function renderMermaid() {
      const contentRoot = slideEl.querySelector(".slide-content");
      if (!contentRoot || !window.mermaid) {
        return;
      }

      const blocks = Array.from(contentRoot.querySelectorAll("pre > code.language-mermaid"));
      blocks.forEach((code, idx) => {
        const pre = code.parentElement;
        if (!pre) {
          return;
        }
        const container = document.createElement("div");
        container.className = "mermaid";
        container.id = `mermaid-${state.index}-${idx}`;
        container.textContent = code.textContent || "";
        pre.replaceWith(container);
      });

      if (blocks.length) {
        try {
          await window.mermaid.run({ querySelector: ".mermaid" });
        } catch {
          // Keep raw text already visible inside .mermaid container.
        }
        updateSlideAlignment();
      }
    }

    function renderSlide() {
      if (!state.slides.length) {
        if (appEl) {
          appEl.classList.add("show-footer");
        }
        if (appTitleEl) {
          appTitleEl.hidden = false;
        }
        slideEl.innerHTML = `
          <div class="empty">
            <div>
              <strong>First, choose the slide delimiters used in your Markdown, then import the Markdown file.</strong>
              <div class="empty-flow">
                <button
                  class="empty-step"
                  type="button"
                  data-action="delimiter-toggle"
                  aria-label="Choose delimiters"
                  title="Choose delimiters"
                  aria-controls="delimiterPanel"
                  aria-expanded="false"
                >
                  <span class="empty-step-index">1</span>
                  <span class="material-symbols-outlined">format_line_spacing</span>
                  <span>Choose delimiters</span>
                </button>
                <span class="empty-flow-arrow">→</span>
                <button class="empty-step primary" type="button" data-action="upload" aria-label="Import markdown file" title="Import markdown file">
                  <span class="empty-step-index">2</span>
                  <span class="material-symbols-outlined">upload_file</span>
                  <span>Import MD file</span>
                </button>
                <span class="empty-flow-arrow">or</span>
                <button class="empty-step" type="button" data-action="url-load-toggle" aria-label="Load from URL" title="Load from URL">
                  <span class="material-symbols-outlined">link</span>
                  <span>Load from URL</span>
                </button>
              </div>
            </div>
          </div>
        `;
        renderTrainMap();
        renderDurationBar();
        renderNavArrows();
        announceStatus("No slides loaded. Upload a markdown file.");
        return;
      }

      if (appTitleEl) {
        appTitleEl.hidden = true;
      }
      if (appEl) {
        appEl.classList.remove("show-footer");
      }
      state.slideStartedAt = Date.now();
      slideEl.innerHTML = `
        <div class="slide-center">
          <div class="slide-content">${state.slides[state.index].html || "<p></p>"}</div>
        </div>
      `;
      applyZoomToCurrentSlide();
      assignHeadingIds();
      configureEmbeds();
      enhanceMediaAccessibility();
      enhanceCallouts();
      enhanceTags();
      renderMath();
      renderMermaid();
      applySearchHighlights();
      updateSlideAlignment();
      slideEl.scrollTop = 0;
      renderTrainMap();
      renderDurationBar();
      renderNavArrows();
      announceStatus(`Slide ${state.index + 1} of ${state.slides.length}`);
    }

    function updateSlideAlignment() {
      const centerEl = slideEl.querySelector(".slide-center");
      const contentEl = slideEl.querySelector(".slide-content");
      if (!centerEl || !contentEl) {
        slideEl.classList.remove("is-tall");
        return;
      }

      const styles = window.getComputedStyle(centerEl);
      const padTop = parseFloat(styles.paddingTop) || 0;
      const padBottom = parseFloat(styles.paddingBottom) || 0;
      const availableHeight = slideEl.clientHeight - padTop - padBottom;
      const contentHeight = contentEl.getBoundingClientRect().height;
      slideEl.classList.toggle("is-tall", contentHeight > availableHeight);
    }

    function goNext() {
      if (state.index < state.slides.length - 1) {
        state.index += 1;
        renderSlide();
      }
    }

    function goPrev() {
      if (state.index > 0) {
        state.index -= 1;
        renderSlide();
      }
    }

    function renderNavArrows() {
      const hasSlides = state.slides.length > 0;
      const visible = state.showNavArrows && hasSlides;
      prevArrowEl.hidden = !visible;
      nextArrowEl.hidden = !visible;
      arrowsToggleEl.setAttribute("aria-expanded", String(visible));
      arrowsToggleEl.disabled = !hasSlides;
      if (!visible) {
        return;
      }
      prevArrowEl.disabled = state.index <= 0;
      nextArrowEl.disabled = state.index >= state.slides.length - 1;
    }

    function renderDurationBar() {
      const durationBarEl = document.getElementById("durationBar");
      if (!durationBarEl) return;
      durationBarEl.innerHTML = "";

      const hasDurations = state.slides.some(s => s.duration != null);
      const totalDuration = state.slides.reduce((sum, s) => sum + (s.duration || 0), 0);

      // Per-slide toggle button
      durationBarToggleEl.hidden = !hasDurations || !state.slides.length;
      durationBarToggleEl.disabled = !hasDurations || !state.slides.length;
      durationBarToggleEl.setAttribute("aria-pressed", String(state.showDurationBar));

      // Global toggle button
      globalDurationBarToggleEl.hidden = totalDuration === 0 || !state.slides.length;
      globalDurationBarToggleEl.disabled = totalDuration === 0 || !state.slides.length;
      globalDurationBarToggleEl.setAttribute("aria-pressed", String(state.showGlobalDurationBar));

      const currentSlide = state.slides[state.index];
      const showPerSlide = state.showDurationBar && currentSlide && currentSlide.duration != null;
      const showGlobal = state.showGlobalDurationBar && totalDuration > 0;

      durationBarEl.hidden = !showPerSlide && !showGlobal;
      if (!showPerSlide && !showGlobal) return;

      function makeBarRow(label, durationSecs, elapsedSecs) {
        const row = document.createElement("div");
        row.className = "duration-bar-row";
        const lbl = document.createElement("span");
        lbl.className = "duration-bar-label";
        lbl.textContent = label;
        const track = document.createElement("div");
        track.className = "slide-duration-bar-track";
        const fill = document.createElement("div");
        fill.className = "slide-duration-bar-fill";
        fill.style.animationDuration = `${durationSecs}s`;
        fill.style.animationDelay = `-${Math.min(elapsedSecs, durationSecs)}s`;
        track.appendChild(fill);
        row.appendChild(lbl);
        row.appendChild(track);
        return row;
      }

      if (showPerSlide) {
        const elapsedSecs = Math.min(
          (Date.now() - state.slideStartedAt) / 1000,
          currentSlide.duration
        );
        durationBarEl.appendChild(makeBarRow("Slide", currentSlide.duration, elapsedSecs));
      }

      if (showGlobal) {
        const slidesBeforeElapsed = state.slides
          .slice(0, state.index)
          .reduce((sum, s) => sum + (s.duration || 0), 0);
        const currentElapsed = currentSlide && currentSlide.duration
          ? Math.min((Date.now() - state.slideStartedAt) / 1000, currentSlide.duration)
          : 0;
        const globalElapsedSecs = slidesBeforeElapsed + currentElapsed;
        durationBarEl.appendChild(makeBarRow("Total", totalDuration, globalElapsedSecs));
      }
    }

    function renderTrainMap() {
      trainMapEl.innerHTML = "";

      if (exportToggleEl) exportToggleEl.hidden = !state.slides.length;

      if (!state.slides.length) {
        state.showTrainMap = false;
        appEl.classList.remove("train-visible");
        mapToggleEl.disabled = true;
        mapToggleEl.setAttribute("aria-pressed", "false");
        mapToggleEl.setAttribute("aria-expanded", "false");
        trainMapEl.setAttribute("aria-hidden", "true");
        return;
      }

      mapToggleEl.disabled = false;
      mapToggleEl.setAttribute("aria-pressed", String(state.showTrainMap));
      mapToggleEl.setAttribute("aria-expanded", String(state.showTrainMap));
      trainMapEl.setAttribute("aria-hidden", String(!state.showTrainMap));
      appEl.classList.toggle("train-visible", state.showTrainMap);
      if (!state.showTrainMap) {
        updateSlideAlignment();
        return;
      }

      const track = document.createElement("div");
      track.className = "train-track";
      trainMapEl.appendChild(track);

      const progress = document.createElement("div");
      progress.className = "train-progress";
      const progressRatio = state.slides.length > 1 ? state.index / (state.slides.length - 1) : 0;
      progress.style.width = `calc((100% - 48px) * ${progressRatio})`;
      trainMapEl.appendChild(progress);

      const stationList = document.createElement("div");
      stationList.className = "station-list";

      const hasDurations = state.slides.some(s => s.duration != null);
      trainMapEl.classList.toggle("has-durations", hasDurations);

      state.slides.forEach((slide, idx) => {
        const step = document.createElement("div");
        step.className = "station-step";

        const station = document.createElement("button");
        station.type = "button";
        station.className = "station";
        if (idx < state.index) {
          station.classList.add("past");
        }
        if (idx === state.index) {
          station.classList.add("active");
          station.setAttribute("aria-current", "step");
        }
        const durationLabel = slide.duration != null ? ` (${formatDuration(slide.duration)})` : "";
        station.setAttribute("aria-label", `Go to slide ${idx + 1}${durationLabel}`);
        station.title = `Slide ${idx + 1}${durationLabel}`;
        station.addEventListener("click", () => {
          state.index = idx;
          renderSlide();
        });

        const num = document.createElement("span");
        num.className = "station-num";
        num.textContent = String(idx + 1);

        step.appendChild(station);
        step.appendChild(num);

        if (slide.duration != null) {
          const dur = document.createElement("span");
          dur.className = "station-duration";
          dur.textContent = formatDuration(slide.duration);
          step.appendChild(dur);
        }

        stationList.appendChild(step);
      });

      trainMapEl.appendChild(stationList);
      updateSlideAlignment();
    }

    function handleUpload(event) {
      const file = event.target.files?.[0];
      if (!file) {
        return;
      }

      const reader = new FileReader();
      reader.onload = () => {
        const text = String(reader.result || "");
        state.sourceMarkdown = text;
        state.slides = parseSlides(text);
        state.index = 0;
        if (state.search.query.trim()) {
          rebuildSearchResults();
        }
        renderSlide();
      };
      reader.readAsText(file);
      event.target.value = "";
    }

    function setUrlLoadPanelOpen(open) {
      if (!urlLoadPanelEl) return;
      urlLoadPanelEl.hidden = !open;
      if (open && urlLoadInputEl) {
        urlLoadInputEl.focus();
        if (urlLoadErrorEl) urlLoadErrorEl.hidden = true;
      }
    }

    async function loadFromUrl(url) {
      const trimmed = String(url || "").trim();
      if (!trimmed) return;
      if (!trimmed.startsWith("http")) {
        if (urlLoadErrorEl) {
          urlLoadErrorEl.textContent = "Please enter a valid http(s) URL.";
          urlLoadErrorEl.hidden = false;
        }
        return;
      }
      if (urlLoadSubmitEl) {
        urlLoadSubmitEl.disabled = true;
        urlLoadSubmitEl.textContent = "Loading…";
      }
      if (urlLoadErrorEl) urlLoadErrorEl.hidden = true;
      try {
        const response = await fetch(trimmed);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const text = await response.text();
        state.sourceMarkdown = text;
        state.slides = parseSlides(text);
        state.index = 0;
        if (state.search.query.trim()) rebuildSearchResults();
        setUrlLoadPanelOpen(false);
        renderSlide();
      } catch (err) {
        const msg = String(err?.message || err);
        if (urlLoadErrorEl) {
          urlLoadErrorEl.textContent = msg.toLowerCase().includes("failed to fetch") || msg.toLowerCase().includes("networkerror")
            ? "Network error — check the URL or the server's CORS settings."
            : `Could not load: ${msg}`;
          urlLoadErrorEl.hidden = false;
        }
      } finally {
        if (urlLoadSubmitEl) {
          urlLoadSubmitEl.disabled = false;
          urlLoadSubmitEl.textContent = "Load";
        }
      }
    }

    slideEl.addEventListener("click", (event) => {
      const target = event.target.closest("[data-action]");
      if (!target) {
        return;
      }
      const action = target.getAttribute("data-action");
      if (action === "upload") {
        fileInputEl.click();
      }
      if (action === "url-load-toggle") {
        setUrlLoadPanelOpen(true);
      }
      if (action === "delimiter-toggle") {
        if (delimiterPanelEl.hidden) {
          setDelimiterPanelOpen(true, target);
        }
      }
    });
    fileInputEl.addEventListener("change", handleUpload);
    delimiterOptionEls.forEach((option) => {
      option.addEventListener("click", () => {
        const kind = option.dataset.kind;
        if (kind === "slide-mode") {
          delimiterDraft.slideMode = "h1";
        } else if (kind === "notes") {
          delimiterDraft.notes = option.dataset.delimiter || "--";
        } else {
          delimiterDraft.slideMode = "delimiter";
          delimiterDraft.slide = option.dataset.delimiter || "---";
        }
        renderDelimiterUI();
      });
    });
    slideDelimiterInputEl?.addEventListener("input", () => {
      delimiterDraft.slideMode = "delimiter";
      delimiterDraft.slide = slideDelimiterInputEl.value;
      renderDelimiterUI();
    });
    notesDelimiterInputEl?.addEventListener("input", () => {
      delimiterDraft.notes = notesDelimiterInputEl.value;
      renderDelimiterUI();
    });
    delimiterApplyEl?.addEventListener("click", () => {
      const applied = applyDelimiters(delimiterDraft.slideMode, delimiterDraft.slide, delimiterDraft.notes);
      if (applied) {
        setDelimiterPanelOpen(false);
      }
    });
    mapToggleEl.addEventListener("click", () => {
      if (!state.slides.length) {
        return;
      }
      state.showTrainMap = !state.showTrainMap;
      renderTrainMap();
      announceStatus(state.showTrainMap ? "Route map shown." : "Route map hidden.");
    });
    durationBarToggleEl.addEventListener("click", () => {
      state.showDurationBar = !state.showDurationBar;
      renderDurationBar();
      announceStatus(state.showDurationBar ? "Duration bar shown." : "Duration bar hidden.");
    });
    globalDurationBarToggleEl.addEventListener("click", () => {
      state.showGlobalDurationBar = !state.showGlobalDurationBar;
      renderDurationBar();
      announceStatus(state.showGlobalDurationBar ? "Global duration bar shown." : "Global duration bar hidden.");
    });
    arrowsToggleEl.addEventListener("click", () => {
      if (!state.slides.length) {
        return;
      }
      state.showNavArrows = !state.showNavArrows;
      renderNavArrows();
      announceStatus(state.showNavArrows ? "Navigation arrows shown." : "Navigation arrows hidden.");
    });
    prevArrowEl.addEventListener("click", goPrev);
    nextArrowEl.addEventListener("click", goNext);
    searchToggleEl.addEventListener("click", () => {
      toggleSearchPanel();
    });
    searchCloseEl.addEventListener("click", () => {
      setSearchPanelOpen(false);
    });
    searchInputEl.addEventListener("input", () => {
      state.search.query = searchInputEl.value;
      rebuildSearchResults();
    });
    searchInputEl.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        if (event.shiftKey) {
          goToPreviousSearchResult();
        } else {
          goToNextSearchResult();
        }
      }
      if (event.key === "Escape") {
        event.preventDefault();
        setSearchPanelOpen(false);
      }
    });
    searchNextEl.addEventListener("click", goToNextSearchResult);
    searchPrevEl.addEventListener("click", goToPreviousSearchResult);

    function isInteractiveTarget(element) {
      if (!(element instanceof HTMLElement)) {
        return false;
      }
      return Boolean(
        element.closest("input, textarea, select, button, a, [contenteditable='true'], video, iframe")
      );
    }

    document.addEventListener("keydown", (event) => {
      if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "f") {
        event.preventDefault();
        if (!state.search.panelOpen) {
          setSearchPanelOpen(true);
        } else {
          searchInputEl.focus();
          searchInputEl.select();
        }
        return;
      }

      if (event.key === "Escape") {
        if (state.search.panelOpen) {
          setSearchPanelOpen(false);
          return;
        }
        if (!zoomPanelEl?.hidden) {
          setZoomPanelOpen(false);
          return;
        }
        if (!settingsPanelEl?.hidden) {
          setSettingsPanelOpen(false);
          return;
        }
      }

      if (isInteractiveTarget(event.target)) {
        return;
      }

      if (event.key === "ArrowRight" || event.key === "PageDown" || event.key === " ") {
        event.preventDefault();
        goNext();
      }
      if (event.key === "ArrowLeft" || event.key === "PageUp") {
        event.preventDefault();
        goPrev();
      }
      if (event.key.toLowerCase() === "m" && event.altKey && state.slides.length) {
        state.showTrainMap = !state.showTrainMap;
        renderTrainMap();
        announceStatus(state.showTrainMap ? "Route map shown." : "Route map hidden.");
      }
      if (event.key.toLowerCase() === "f" && !event.ctrlKey && !event.metaKey && !event.altKey) {
        toggleFullscreen();
      }
    });

    renderDelimiterUI();
    window.addEventListener("resize", () => {
      if (!delimiterPanelEl.hidden) {
        positionDelimiterPanel(delimiterAnchorEl);
      }
    });
    window.addEventListener("resize", updateSlideAlignment);

    // ── Fullscreen ────────────────────────────────────────────────────────
    function updateFullscreenButton() {
      const isFS = !!document.fullscreenElement;
      if (!fullscreenToggleEl) return;
      fullscreenToggleEl.querySelector(".material-symbols-outlined").textContent =
        isFS ? "fullscreen_exit" : "fullscreen";
      fullscreenToggleEl.setAttribute("aria-label", isFS ? "Exit fullscreen" : "Enter fullscreen");
      fullscreenToggleEl.title = isFS ? "Exit fullscreen (F)" : "Enter fullscreen (F)";
    }

    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(() => {});
      } else {
        document.exitFullscreen().catch(() => {});
      }
    }

    fullscreenToggleEl?.addEventListener("click", toggleFullscreen);
    document.addEventListener("fullscreenchange", updateFullscreenButton);
    // ─────────────────────────────────────────────────────────────────────

    // ── Zoom panel events ─────────────────────────────────────────────────
    zoomToggleEl?.addEventListener("click", () => {
      setSettingsPanelOpen(false);
      setZoomPanelOpen(zoomPanelEl.hidden, zoomToggleEl);
    });

    zoomOutEl?.addEventListener("click", () => {
      stepZoom(-1);
    });

    zoomInEl?.addEventListener("click", () => {
      stepZoom(1);
    });

    zoomResetEl?.addEventListener("click", () => {
      resetZoom();
    });

    // ─────────────────────────────────────────────────────────────────────

    // ── Settings panel events ─────────────────────────────────────────────
    settingsToggleEl?.addEventListener("click", () => {
      setZoomPanelOpen(false);
      setSettingsPanelOpen(settingsPanelEl.hidden, settingsToggleEl);
    });

    settingsPanelEl?.addEventListener("click", (e) => {
      const btn = e.target.closest("[data-settings-bg], [data-settings-font], #settingsReset");
      if (!btn) return;
      e.stopPropagation(); // prevent bubbling to the outside-click handler after innerHTML is replaced
      if (btn.dataset.settingsBg)   applySettings({ ...appSettings, bg:   btn.dataset.settingsBg });
      if (btn.dataset.settingsFont) applySettings({ ...appSettings, font: btn.dataset.settingsFont });
      if (btn.id === "settingsReset") applySettings({ ...SETTINGS_DEFAULTS });
    });

    document.addEventListener("click", (e) => {
      if (!zoomPanelEl?.hidden &&
          !zoomPanelEl.contains(e.target) &&
          !zoomToggleEl.contains(e.target)) {
        setZoomPanelOpen(false);
      }
      if (!settingsPanelEl?.hidden &&
          !settingsPanelEl.contains(e.target) &&
          !settingsToggleEl.contains(e.target)) { // use contains() to cover clicks on the icon span inside the button
        setSettingsPanelOpen(false);
      }
    });

    window.addEventListener("resize", () => {
      if (!zoomPanelEl?.hidden) positionZoomPanel(zoomAnchorEl);
    });

    window.addEventListener("resize", () => {
      if (!settingsPanelEl?.hidden) positionSettingsPanel(settingsAnchorEl);
    });
    // ─────────────────────────────────────────────────────────────────────

    // ── Load from URL events ───────────────────────────────────────────────
    urlLoadCloseEl?.addEventListener("click", () => {
      setUrlLoadPanelOpen(false);
    });

    urlLoadSubmitEl?.addEventListener("click", () => {
      loadFromUrl(urlLoadInputEl?.value);
    });

    urlLoadInputEl?.addEventListener("keydown", (e) => {
      if (e.key === "Enter") loadFromUrl(urlLoadInputEl.value);
      if (e.key === "Escape") setUrlLoadPanelOpen(false);
    });
    // ─────────────────────────────────────────────────────────────────────

    // ── Export to HTML ─────────────────────────────────────────────────────
    function exportHTML() {
      if (!state.sourceMarkdown) return;

      const title = (state.frontmatter && state.frontmatter.title)
        ? state.frontmatter.title
        : "export";

      const { content } = extractFrontmatter(state.sourceMarkdown);
      const bodyHtml = markdownToHtml(applyObsidianSyntax(content));

      const safeTitle = escapeHtml(title);
      const fullHtml = `<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>${safeTitle}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 48px clamp(20px, 8vw, 80px);
      font-family: "Avenir Next", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      font-size: 1rem;
      line-height: 1.7;
      color: #1e2430;
      background: #ffffff;
      max-width: 900px;
      margin-inline: auto;
    }
    h1, h2, h3, h4, h5, h6 {
      line-height: 1.25;
      margin: 1.8em 0 0.5em;
      font-weight: 700;
      color: #111827;
    }
    h1 { font-size: 2rem; border-bottom: 2px solid #e5e7eb; padding-bottom: 0.3em; }
    h2 { font-size: 1.5rem; border-bottom: 1px solid #e5e7eb; padding-bottom: 0.2em; }
    h3 { font-size: 1.25rem; }
    p { margin: 0.75em 0; }
    a { color: #1c7ed6; text-underline-offset: 0.15em; }
    a:hover { color: #176ab5; }
    img { max-width: 100%; height: auto; border-radius: 6px; }
    blockquote {
      margin: 1.2em 0;
      padding: 0.6em 1.2em;
      border-left: 4px solid #1c7ed6;
      background: #f0f6ff;
      color: #374151;
      border-radius: 0 6px 6px 0;
    }
    blockquote p { margin: 0; }
    pre {
      background: #1e2430;
      color: #e2e8f0;
      padding: 1.2em 1.4em;
      border-radius: 8px;
      overflow-x: auto;
      font-size: 0.875rem;
      line-height: 1.6;
    }
    code {
      font-family: "Fira Code", "Cascadia Code", Consolas, monospace;
    }
    p code, li code {
      background: #f1f5f9;
      color: #be185d;
      padding: 0.15em 0.35em;
      border-radius: 4px;
      font-size: 0.875em;
    }
    table {
      border-collapse: collapse;
      width: 100%;
      margin: 1.2em 0;
      font-size: 0.95rem;
    }
    th, td {
      border: 1px solid #d1d5db;
      padding: 0.5em 0.8em;
      text-align: left;
    }
    th { background: #f8fafc; font-weight: 600; }
    tr:nth-child(even) td { background: #f8fafc; }
    ul, ol { padding-left: 1.6em; margin: 0.75em 0; }
    li { margin: 0.3em 0; }
    hr {
      border: none;
      border-top: 2px solid #e5e7eb;
      margin: 2.5em 0;
    }
    mark {
      background: #fff1bf;
      color: inherit;
      padding: 0 0.12em;
      border-radius: 3px;
    }
  </style>
</head>
<body>
${bodyHtml}
</body>
</html>`;

      const blob = new Blob([fullHtml], { type: "text/html;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = title.replace(/[^a-zA-Z0-9_\- ]/g, "_").trim() + ".html";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 10000);
    }

    exportToggleEl?.addEventListener("click", exportHTML);
    // ─────────────────────────────────────────────────────────────────────

    loadSettings();
    renderSlide();
  </script>
</body>
</html>
